version: "3.9"

# Production overrides — use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    volumes: []
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    restart: always
    volumes:
      - model-weights:/app/ml/model
      - uploads-data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      - ENVIRONMENT=production

  db:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
